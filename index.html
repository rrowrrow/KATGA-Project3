<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>KATGA Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="container">
  <h1>⚙️ KATGA Admin</h1>
  <p>Buat Pesan HSSE Harian</p>

  <label>Tanggal</label>
  <input type="date" id="date">

  <label>Kata Kunci (Wordle)</label>
  <input type="text" id="word" placeholder="contoh: SIAP">

  <label>Kategori</label>
  <input type="text" id="category" placeholder="contoh: Fit To Work">

  <label>Hint</label>
  <input type="text" id="hint">

  <label>Ringkasan Pesan</label>
  <textarea id="message"></textarea>

  <label>Full Message</label>
  <textarea id="fullMessage"></textarea>

  <label>Makna</label>
  <textarea id="meaning"></textarea>

  <label>Edukasi K3</label>
  <textarea id="k3Education"></textarea>

  <label>Pesan Penutup</label>
  <textarea id="dailyMessage"></textarea>

  <button onclick="generateJSON()">Generate JSON</button>

  <h3>Hasil JSON</h3>
  <textarea id="output"></textarea>

  <button onclick="copyJSON()">Copy</button>
</div>

<script src="admin.js"></script>
</body>
</html>
