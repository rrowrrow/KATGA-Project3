<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KATGA</title>

  <!-- ✅ FIX -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="app-shell">

  <header class="hero card">
    <div>
      <h1>KATGA</h1>
      <p>Kata-Kata K3 Harian</p>
    </div>
  </header>

  <!-- ✅ STATS -->
  <section class="stats card">
    <div class="stat-item">
      <span>Streak</span>
      <strong id="streakCount">0</strong>
    </div>

    <div class="stat-item">
      <span>Best</span>
      <strong id="bestCount">0</strong>
    </div>
  </section>

  <!-- ✅ STEP 1 -->
  <section id="readerSection" class="card section">

    <h2>Pesan Harian</h2>

    <div id="messageScrollBox" class="message-scroll">
      <p id="messageFullText">Memuat...</p>
    </div>

    <div class="reader-controls">
      <label>
        <input type="checkbox" id="confirmRead" disabled />
        Saya sudah membaca
      </label>

      <button id="startGameBtn" disabled>
        Mulai Game
      </button>
    </div>

  </section>

  <!-- ✅ STEP 2 -->
  <section id="gameSection" class="card section hidden">

    <h2>Game Tebak Kata</h2>

    <div id="board" class="board"></div>

    <div class="input-wrap">
      <input id="guessInput" />

      <button id="submitBtn">
        Submit
      </button>
    </div>

    <div id="keyboard" class="keyboard"></div>

  </section>

</div>

<!-- ✅ MODAL -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal">
    <div id="modalBody"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- ✅ FIX -->
<script src="script.js"></script>

</body>
</html>
