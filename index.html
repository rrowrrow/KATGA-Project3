<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>KATGA - Kata K3 Harian</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>⚡ KATGA</h1>
  <p class="subtitle">Kata-Kata K3 Harian</p>

  <!-- STEP 1: MESSAGE -->
  <div id="messageBox">
    <h3>📢 Pesan HSSE Hari Ini</h3>
    <p id="messageText"></p>

    <label>
      <input type="checkbox" id="confirmRead">
      Saya sudah membaca pesan
    </label>

    <button id="startBtn" disabled>Mulai Game</button>
  </div>

  <!-- STEP 2: GAME -->
  <div id="gameBox" class="hidden">
    <h3>🎯 Tebak Kata Kunci</h3>
    <p id="hintText"></p>

    <input id="guessInput" maxlength="6" placeholder="Ketik jawaban...">
    <button onclick="submitGuess()">Submit</button>

    <p id="feedback"></p>
  </div>

  <!-- POPUP -->
  <div id="popup" class="hidden">
    <div class="popup-content">
      <h3 id="popupTitle"></h3>
      <p id="popupBody"></p>
      <button onclick="closePopup()">OK</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
